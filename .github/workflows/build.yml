name: Build Debug APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  # Usar Node.js 24 para todas las actions (fix deprecation warning)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Upload APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1b. Decodificar google-services.json desde secret base64
      #     El secret GOOGLE_SERVICES_JSON_B64 debe contener:
      #       cat app/google-services.json | base64 -w0
      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_B64" ]; then
            echo "❌ Falta el secret GOOGLE_SERVICES_JSON_B64"
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON_B64" | base64 -d > app/google-services.json
          echo "✅ google-services.json escrito ($(wc -c < app/google-services.json) bytes)"

      # 2. Configurar Java 17 (requerido por AGP 8.x)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Instalar Gradle 8.7 directamente (no requiere gradle-wrapper.jar)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'
          cache-read-only: false

      # 4. Build del APK de debug
      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      # 5. Subir el APK como artifact descargable desde GitHub
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: logistics-monitor-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error

      # 6. Mostrar info del APK en el log
      - name: APK Info
        run: |
          echo "✅ Build completado"
          find app/build/outputs/apk/debug -name "*.apk" -exec ls -lh {} \;
