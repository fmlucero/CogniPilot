name: Build Debug APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Upload APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar Java 17 (requerido por AGP 8.x)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Cache de Gradle para builds más rápidos
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. Descargar gradle-wrapper.jar (binario no commiteado)
      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar

      # 5. Dar permisos de ejecución al wrapper
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 6. Build del APK de debug (sin firma, listo para instalar en modo debug)
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # 7. Subir el APK como artifact descargable desde GitHub
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: logistics-monitor-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error

      # 8. Mostrar info del APK en el log
      - name: APK Info
        run: |
          echo "✅ Build completado"
          find app/build/outputs/apk/debug -name "*.apk" -exec ls -lh {} \;
